<body>
<div id="root"></div>

<!-- Animation framework + our components -->
<script type="text/babel" src="242b1174-e2b3-42ee-b2db-b58c00fe11be"></script>
<script type="text/babel" src="bc5383a1-f121-4d60-abb5-3fb0da1e7843"></script>
<script type="text/babel" src="50d75347-3555-4528-9684-3d9c03b53502"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "headline": "none",
  "bgTone": "transparent",
  "captions": true,
  "cursor": false
}/*EDITMODE-END*/;

const BG_TONES = {
  transparent: 'transparent',
  paper:  '#F6F4EF',
  white:  '#FFFFFF',
  mist:   '#EEF3F4',
  sand:   '#F3EFE8',
};

function App() {
  const [settings, setSettings] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  // Edit mode wiring — listener FIRST, then announce
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (key, value) => {
    setSettings(s => {
      const next = { ...s, [key]: value };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
      return next;
    });
  };

  const stageSettings = {
    headline: settings.headline,
    bgTone: BG_TONES[settings.bgTone] != null ? BG_TONES[settings.bgTone] : 'transparent',
    captions: !!settings.captions,
    cursor: !!settings.cursor,
  };

  return (
    <>
      <Stage
        width={1280}
        height={720}
        duration={window.TOTAL}
        background={stageSettings.bgTone}
        loop={true}
        autoplay={true}
        persistKey="ih-demo"
      >
        <Demo settings={stageSettings} />
      </Stage>

      {editMode && (
        <TweaksPanel settings={settings} onChange={update} />
      )}
    </>
  );
}

function TweaksPanel({ settings, onChange }) {
  return (
    <div className="tweaks-panel" onMouseDown={e => e.stopPropagation()}>
      <h3>Tweaks</h3>

      <div className="row">
        <label>Opening headline</label>
        <div className="seg">
          <button className={settings.headline === 'none' ? 'active' : ''} onClick={() => onChange('headline', 'none')}>None</button>
          <button className={settings.headline === 'presence' ? 'active' : ''} onClick={() => onChange('headline', 'presence')}>Presence</button>
          <button className={settings.headline === 'time' ? 'active' : ''} onClick={() => onChange('headline', 'time')}>Time</button>
        </div>
      </div>

      <div className="row">
        <label>Background tone</label>
        <div className="seg">
          <button className={settings.bgTone === 'transparent' ? 'active' : ''} onClick={() => onChange('bgTone', 'transparent')}>None</button>
          <button className={settings.bgTone === 'paper' ? 'active' : ''} onClick={() => onChange('bgTone', 'paper')}>Paper</button>
          <button className={settings.bgTone === 'white' ? 'active' : ''} onClick={() => onChange('bgTone', 'white')}>White</button>
          <button className={settings.bgTone === 'mist' ? 'active' : ''} onClick={() => onChange('bgTone', 'mist')}>Mist</button>
          <button className={settings.bgTone === 'sand' ? 'active' : ''} onClick={() => onChange('bgTone', 'sand')}>Sand</button>
        </div>
      </div>

      <div className="row toggle">
        <label style={{marginBottom: 0}}>Captions</label>
        <input type="checkbox" checked={!!settings.captions} onChange={e => onChange('captions', e.target.checked)} />
      </div>

      <div className="row toggle">
        <label style={{marginBottom: 0}}>Cursor</label>
        <input type="checkbox" checked={!!settings.cursor} onChange={e => onChange('cursor', e.target.checked)} />
      </div>
    </div>
  );
}

// Wait for all babel scripts to load before mounting
function waitForGlobals(cb) {
  if (window.Stage && window.Demo && window.WelcomeScreen) return cb();
  setTimeout(() => waitForGlobals(cb), 30);
}

waitForGlobals(() => {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
});
</script>
