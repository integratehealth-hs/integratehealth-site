<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started – Integrate Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600&family=Petrona:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #333333; --muted: #666666;
      --grad: linear-gradient(90deg, #5DBED8 0%, #0057B8 100%);
      --font-main: 'Karla', sans-serif; --font-serif: 'Petrona', serif;
    }
    html { font-family: var(--font-main); font-size: 16px; color: var(--text); }
    body { background: #fff; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    img { display: block; }

    /* HEADER */
    header { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e5e7eb; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 90vw; margin: 0 auto; padding: 4px 24px; }
    .logo img { height: 90px; }
    nav.desktop { display: flex; align-items: center; gap: 32px; }
    nav.desktop a { color: #6b7280; font-size: 15px; transition: color .2s; }
    nav.desktop a:hover { color: #111; }
    .btn-login { padding: 8px 24px; border-radius: 6px; font-size: 15px; font-family: var(--font-main); font-weight: 300; background: linear-gradient(white, white) padding-box, var(--grad) border-box; border: 2px solid transparent; cursor: pointer; }
    .btn-login span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-cta { padding: 8px 24px; border-radius: 6px; font-size: 15px; font-family: var(--font-main); font-weight: 300; background: var(--grad); color: #fff; border: none; cursor: pointer; transition: opacity .2s; }
    .btn-cta:hover { opacity: 0.88; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .mobile-drawer { display: none; position: fixed; top: 0; right: 0; width: 260px; height: 100vh; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 200; padding: 24px; flex-direction: column; gap: 24px; transform: translateX(100%); transition: transform .35s cubic-bezier(.25,.8,.25,1); }
    .mobile-drawer.open { transform: translateX(0); }
    .drawer-close { align-self: flex-end; background: none; border: none; cursor: pointer; }
    .mobile-overlay { display: none; position: fixed; inset: 0; z-index: 190; }
    .mobile-overlay.open { display: block; }
    .mobile-drawer nav { display: flex; flex-direction: column; gap: 20px; }
    .mobile-drawer nav a { color: #6b7280; font-size: 16px; }

    /* MAIN */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 24px; }
    .form-wrap { width: 100%; max-width: 520px; }
    .form-wrap h1 {
      font-size: clamp(28px, 4vw, 44px); color: var(--text);
      font-family: var(--font-main); font-weight: 300;
      text-align: center; margin-bottom: 8px; line-height: 1.2;
    }
    .form-wrap .sub {
      text-align: center; font-family: var(--font-serif); font-style: italic;
      font-size: 17px; color: var(--muted); margin-bottom: 48px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .form-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .form-field label { font-size: 14px; color: var(--text); font-family: var(--font-main); }
    .form-field input {
      width: 100%; padding: 14px 16px; border-radius: 8px;
      border: 1.5px solid #5DBED8; font-size: 15px; font-family: var(--font-main);
      outline: none; transition: border-color .2s, box-shadow .2s; color: var(--text);
      background: #fff;
    }
    .form-field input:focus { border-color: #0057B8; box-shadow: 0 0 0 3px rgba(93,190,216,.18); }
    .form-row .form-field { margin-bottom: 0; }
    .btn-submit {
      width: 100%; padding: 16px 24px; border-radius: 8px; border: none;
      background: var(--grad); color: #fff; font-family: var(--font-main);
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: opacity .2s, transform .2s; margin-bottom: 16px;
    }
    .btn-submit:hover { opacity: .88; transform: scale(1.02); }
    .form-note { text-align: center; font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--muted); }

    /* Success state */
    .success-msg { display: none; text-align: center; padding: 48px 24px; }
    .success-msg .check-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .success-msg h2 { font-size: 28px; color: var(--text); margin-bottom: 12px; }
    .success-msg p { font-family: var(--font-serif); font-style: italic; font-size: 17px; color: var(--muted); line-height: 1.65; }

    /* FOOTER */
    footer { background: var(--text); color: #fff; padding: 24px 32px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-inner img { height: 110px; filter: brightness(0) invert(1); }
    .footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .btn-contact { padding: 12px 32px; border: 2px solid #fff; border-radius: 6px; color: #fff; background: var(--text); font-family: var(--font-main); font-size: 14px; font-weight: 300; letter-spacing: .08em; cursor: pointer; transition: opacity .2s; }
    .btn-contact:hover { opacity: .8; }
    .footer-copy { font-size: 13px; text-align: right; color: rgba(255,255,255,.75); }
    .footer-copy a { color: rgba(255,255,255,.75); }

    @media (max-width: 900px) {
      nav.desktop, .header-inner .btn-login, .header-inner .btn-cta { display: none; }
      .hamburger { display: block; }
      .mobile-drawer { display: flex; }
      .form-row { grid-template-columns: 1fr; }
      .form-row .form-field { margin-bottom: 24px; }
      .footer-inner { flex-direction: column; align-items: center; gap: 12px; }
      .footer-right { align-items: center; }
      .footer-copy { text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html"><img src="assets/logo.png" alt="Integrate Health" /></a>
    <nav class="desktop">
      <a href="solutions.html">solutions</a>
      <a href="pricing.html">pricing</a>
      <a href="https://app.integratehealth.ai" target="_blank" class="btn-login"><span>log in</span></a>
      <a href="get-started.html"><button class="btn-cta">get started</button></a>
    </nav>
    <button class="hamburger" id="hamburgerBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
</header>
<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <button class="drawer-close" id="drawerClose"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <nav>
    <a href="solutions.html">solutions</a>
    <a href="pricing.html">pricing</a>
    <a href="https://app.integratehealth.ai" target="_blank">log in</a>
    <a href="get-started.html"><button class="btn-cta" style="width:100%">get started</button></a>
  </nav>
</div>

<main>
  <div class="form-wrap">
    <!-- Form -->
    <div id="formSection">
      <h1>see integrate in action</h1>
      

      <form id="signupForm" novalidate>
        <div class="form-row">
          <div class="form-field">
            <label for="firstName">first name</label>
            <input type="text" id="firstName" name="firstName" required autocomplete="given-name" />
          </div>
          <div class="form-field">
            <label for="lastName">last name</label>
            <input type="text" id="lastName" name="lastName" required autocomplete="family-name" />
          </div>
        </div>
        <div class="form-field">
          <label for="email">email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="phone">phone number</label>
          <input type="tel" id="phone" name="phone" required autocomplete="tel" />
        </div>
        <div class="form-field">
          <label for="clinicName">clinic name</label>
          <input type="text" id="clinicName" name="clinicName" required autocomplete="organization" />
        </div>
        <button type="submit" class="btn-submit">send demo to my inbox</button>
        
      </form>
    </div>

    <!-- Success -->
    <div class="success-msg" id="successMsg">
      <div class="check-circle">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><polyline points="7,18 14,25 29,10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>you're all set!</h2>
      <p>we'll be in touch within 24 hours to get your 48-hour free trial started.<br />get ready to get time back.</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <a href="index.html"><img src="assets/logo.png" alt="Integrate Health" /></a>
    <div class="footer-right">
      <a href="get-started.html"><button class="btn-contact">CONTACT US</button></a>
      <div class="footer-copy">
        <p>Copyright 2026 Integrate Health, LLC</p>
        <a href="privacy-policy.html">privacy policy</a>
      </div>
    </div>
  </div>
</footer>

<script>
  // Mobile menu
  const hamburger = document.getElementById('hamburgerBtn');
  const overlay   = document.getElementById('mobileOverlay');
  const drawer    = document.getElementById('mobileDrawer');
  const closeBtn  = document.getElementById('drawerClose');
  hamburger.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('open'); });
  closeBtn.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); });
  overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); });

  // Form submit
  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const inputs = document.querySelectorAll('#signupForm input[required]');
    let valid = true;
    inputs.forEach(inp => {
      inp.style.borderColor = '';
      if (!inp.value.trim()) { inp.style.borderColor = '#ef4444'; valid = false; }
    });
    if (!valid) return;
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
