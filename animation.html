<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Integrate Health — Product Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Petrona:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #root { position: fixed; inset: 0; }
    @keyframes ih-caret { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    @keyframes ih-spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="animation/framework.jsx"></script>
<script type="text/babel" src="animation/screens.jsx"></script>
<script type="text/babel" src="animation/timeline.jsx"></script>

<script type="text/babel">
const HERO_MODE = new URLSearchParams(location.search).has('hero');

function App() {
  return (
    <Stage
      width={1280}
      height={720}
      duration={window.TOTAL || 25}
      background="transparent"
      loop={true}
      autoplay={true}
      persistKey="ih-demo-hero"
      showBar={!HERO_MODE}
      shadow={!HERO_MODE}
    >
      <Demo settings={{
        headline: 'none',
        bgTone: 'transparent',
        captions: !HERO_MODE,
        cursor: true,
      }} />
    </Stage>
  );
}

function waitForGlobals(cb) {
  if (window.Stage && window.Demo && window.WelcomeScreen) return cb();
  setTimeout(() => waitForGlobals(cb), 30);
}

waitForGlobals(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
</script>
</body>
</html>
